# ================= 出站策略 (保持原样) =================
pr: &pr {type: select, proxies: [♻️ 自动选择, ♻️ 香港自动, ♻️ 日本自动, ♻️ 美国自动, ♻️ 台湾自动, ♻️ 新加坡自动, 🌐 手动选择,  直连]}

proxy-groups:
  - {name: 🚀 默认代理, <<: *pr, default: ♻️ 自动选择}
  - {name: ✈️ MyUrl, <<: *pr, default: ♻️ 自动选择}
  - {name: 🍀 Google-Work, <<: *pr, default: ♻️ 自动选择}
  - {name: 📹 YouTube, <<: *pr, default: ♻️ 自动选择}
  - {name: 🎵 TikTok, <<: *pr, default: ♻️ 美国自动}
  - {name: 🎥 NETFLIX, <<: *pr, default: ♻️ 新加坡自动}
  - {name: 🐬 OneDrive, <<: *pr, default: ♻️ xsus}
  - {name: 🚀 Oversea-Game, <<: *pr, default: 直连}
  - {name: 🎯 直连, type: select, proxies: [直连, 🚀 默认代理]}
  - {name: 🚫 AD-BLOCK, type: select, proxies: [REJECT, DIRECT]}
  - {name: 🐟 漏网之鱼, <<: *pr, default: 🚀 默认代理}
  - {name: 🌐 手动选择, type: select, include-all: true, use: [Airport1]}
  - {name: ♻️ 香港自动, type: url-test, use: [Airport1], include-all: true, tolerance: 50, interval: 150, url: "http://cp.cloudflare.com/generate_204", filter: "(?=.*(hk|港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美|a1|aws|acck|cc|rn|ak|xueshan)).)*$"}
  - {name: ♻️ 日本自动, type: url-test, use: [Airport1], include-all: true, tolerance: 50, interval: 150, url: "http://cp.cloudflare.com/generate_204", filter: "(?=.*(jp|日|JP|(?i)Japan))^((?!(港|台|韩|新|美|尼|a1|aws|acck|cc|rn|ak|xueshan)).)*$"}
  - {name: ♻️ 台湾自动, type: url-test, use: [Airport1], include-all: true, tolerance: 50, interval: 150, url: "http://cp.cloudflare.com/generate_204", filter: "(?=.*(tw|台|TW|(?i)Taiwan))^((?!(港|日|韩|新|美|a1|aws|acck|cc|rn|ak|lxueshan)).)*$"}
  - {name: ♻️ 新加坡自动, type: url-test, use: [Airport1], include-all: true, tolerance: 50, interval: 150, url: "http://cp.cloudflare.com/generate_204", filter: "(?=.*(sg|狮城|新|SG|(?i)Singapore))^((?!(港|台|日|韩|美|a1|aws|acck|cc|rn|ak|xueshan)).)*$"}
  - {name: ♻️ 美国自动, type: url-test, use: [Airport1], include-all: true, tolerance: 50, interval: 150, url: "http://cp.cloudflare.com/generate_204", filter: "(?=.*(美|US|us|(?i)States|America))^((?!(港|台|日|韩|新|Aus|AUS|澳|au|a1|aws|acck|ak|xueshan)).)*$"}
  - {name: ♻️ 自动选择, type: url-test, use: [Airport1], include-all: true, tolerance: 50, interval: 150, url: "http://cp.cloudflare.com/generate_204", filter: "^((?!(直连|home|a1|aws|acck|cc|rn|ak|xueshan)).)*$"}

# ================= 规则集 (保持原样) =================
rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
  class: &class {type: http, interval: 86400, behavior: classical, format: text}
  domain_text: &domain_text {type: http, interval: 86400, behavior: domain, format: yaml}

